name: AI Search Agent (Public OSINT Sweep)

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - "scripts/search_agent.py"
      - "scripts/evidence_chain.py"
      - "scripts/search_run_evidence.py"
      - "scripts/test_search_run_evidence.py"
      - "scripts/test_search_agent_canonical_read_only.py"
      - "scripts/verify_activation_readiness.py"
      - "scripts/validate_evidence_outputs.py"
      - "scripts/build_ai_agent_summary.py"
      - "data/sources/**"
      - ".github/workflows/ai_search_agent.yml"

permissions:
  contents: write

concurrency:
  group: freedom-ai-search-agent
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas beautifulsoup4 feedparser requests

      - name: Validate zero-hit evidence path
        run: python scripts/test_search_run_evidence.py

      - name: Prove canonical inputs are read-only
        run: python scripts/test_search_agent_canonical_read_only.py

      - name: Verify activation boundaries
        run: python scripts/verify_activation_readiness.py

      - name: Run AI Search Agent
        run: |
          python scripts/search_agent.py --base . --max-event-targets 25 --max-person-targets 25
          python scripts/build_ai_agent_summary.py --base .

      - name: Assert canonical master immutability
        run: git diff --exit-code -- data/master/

      - name: Validate portable evidence outputs
        run: python scripts/validate_evidence_outputs.py --base .

      - name: Write durable successful run receipt
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          TRIGGER_SHA: ${{ github.sha }}
          TRIGGER_EVENT: ${{ github.event_name }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          ARTIFACT_NAME: free-dom-ai-search-verification-${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('.')
          readiness_path = root / 'data/evidence/verification/activation-readiness.json'
          readiness = json.loads(readiness_path.read_text(encoding='utf-8'))
          if readiness.get('result') != 'PASS':
              raise SystemExit('Refusing success receipt: activation readiness is not PASS')

          run_id = os.environ['RUN_ID']
          receipt = {
              'schema': 'stegverse.free-dom.workflow-run-receipt.v1',
              'workflow': 'AI Search Agent (Public OSINT Sweep)',
              'result': 'PASS',
              'run_id': int(run_id),
              'run_attempt': int(os.environ['RUN_ATTEMPT']),
              'trigger_sha': os.environ['TRIGGER_SHA'],
              'trigger_event': os.environ['TRIGGER_EVENT'],
              'workflow_ref': os.environ['WORKFLOW_REF'],
              'artifact_name': os.environ['ARTIFACT_NAME'],
              'generated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'activation_readiness_result': readiness['result'],
              'canonical_sha256': readiness.get('canonical_sha256', {}),
              'governance_checks': readiness.get('checks', []),
              'canonical_write_authority': False,
              'promotion_authority': False,
          }
          out = root / 'data/evidence/runs' / f'ai-search-{run_id}.json'
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(receipt, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(f'Wrote durable PASS receipt: {out}')
          PY

      - name: Upload governed verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-dom-ai-search-verification-${{ github.run_id }}
          path: |
            data/evidence/verification/activation-readiness.json
            data/evidence/runs/
            data/evidence/receipts/
            data/evidence/batches/
            data/logs/ai_agent/
            data/summary/
          if-no-files-found: error
          retention-days: 30

      - name: Commit governed evidence outputs if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/unverified/ data/logs/ai_agent/ data/summary/ data/evidence/
          if git diff --cached --quiet; then
            echo "No governed evidence changes to commit."
            exit 0
          fi
          git commit -m "chore(ai-agent): update public-source leads + governed evidence receipts"
          git push origin HEAD:main