name: Governed Local Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - "data/**"
      - "scripts/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: freedom-governed-local-validation
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas beautifulsoup4 feedparser requests

      - name: Validate pending-import governance
        run: python scripts/test_import_pending_governance.py

      - name: Validate zero-hit evidence path
        run: python scripts/test_search_run_evidence.py

      - name: Prove search agent keeps canonical inputs read-only
        run: python scripts/test_search_agent_canonical_read_only.py

      - name: Verify activation boundaries
        run: python scripts/verify_activation_readiness.py

      - name: Validate governed evidence outputs
        run: python scripts/validate_evidence_outputs.py --base .

      - name: Build derived documentation for verification
        run: |
          python scripts/build_checklist.py
          python scripts/build_changelog.py
          python scripts/make_version_badge.py
          python scripts/make_freshness_badge.py

      - name: Restore canonical records
        run: git restore --source=HEAD --worktree --staged -- data/master/

      - name: Assert canonical immutability
        run: |
          if ! git diff --quiet -- data/master/; then
            echo "Canonical record mutation detected; refusing validation."
            git diff -- data/master/
            exit 1
          fi

      - name: Upload governed validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-dom-local-validation-${{ github.run_id }}
          path: |
            data/evidence/verification/activation-readiness.json
            data/evidence/runs/
            data/evidence/receipts/
            data/evidence/batches/
            data/logs/ai_agent/
            data/summary/
            CHANGELOG.md
            CHECKLIST.md
            docs/badges/
          if-no-files-found: error
          retention-days: 30
