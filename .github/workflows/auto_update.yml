name: Governed Local Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - "data/**"
      - "scripts/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: freedom-governed-local-validation
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas beautifulsoup4 feedparser requests

      - name: Validate zero-hit evidence path
        run: python scripts/test_search_run_evidence.py

      - name: Validate governed evidence outputs
        run: python scripts/validate_evidence_outputs.py --base .

      - name: Build derived documentation
        run: |
          python scripts/build_checklist.py
          python scripts/build_changelog.py
          python scripts/make_version_badge.py
          python scripts/make_freshness_badge.py

      - name: Restore canonical records
        run: git restore --source=HEAD --worktree --staged -- data/master/

      - name: Assert canonical immutability
        run: |
          if ! git diff --quiet -- data/master/; then
            echo "Canonical record mutation detected; refusing commit."
            git diff -- data/master/
            exit 1
          fi

      - name: Commit governed local artifacts if changed
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            CHANGELOG.md
            CHECKLIST.md
            data/summary/
            docs/badges/
            data/unverified/
            data/evidence/
            data/logs/ai_agent/
          message: "chore(validation): rebuild governed local artifacts"
          default_author: github_actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
