name: Auto Update (Governed Local Validation)

on:
  push:
    branches: [ "main" ]
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/auto_update_tv_patch.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: freedom-governed-local-validation
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 feedparser

      - name: Record canonical baseline
        run: git diff --no-ext-diff --binary HEAD -- data/master/ > /tmp/master-before.patch

      - name: Run repository-local evidence tests
        run: |
          python scripts/test_search_run_evidence.py
          python scripts/validate_evidence_outputs.py --base .

      - name: Build non-canonical summaries
        run: |
          python scripts/make_version_badge.py
          python scripts/make_freshness_badge.py
          python scripts/build_checklist.py
          python scripts/build_changelog.py

      - name: Enforce canonical immutability
        run: |
          git restore --source=HEAD --staged --worktree -- data/master/
          if ! git diff --quiet -- data/master/; then
            echo "::error::Governed local validation attempted to mutate data/master/."
            exit 1
          fi
          git diff --no-ext-diff --binary HEAD -- data/master/ > /tmp/master-after.patch
          cmp /tmp/master-before.patch /tmp/master-after.patch

      - name: Commit governed local artifacts if changed
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            CHANGELOG.md
            CHECKLIST.md
            data/summary/**
            docs/badges/**
            data/unverified/**
            data/archive/**
            data/evidence/**
            data/logs/ai_agent/**
          message: "chore(auto-update): rebuild governed local artifacts"
          default_author: github_actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
